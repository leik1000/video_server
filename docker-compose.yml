services:
  video-server:
    build: .
    container_name: video-server
    restart: unless-stopped
    ports:
      - "7000:7000"
    environment:
      VIDEO_SERVER_API_TOKEN: "replace-with-a-long-random-secret"
      VIDEO_SERVER_PUBLIC_BASE_URL: "https://video.example.com/videos"
      VIDEO_SERVER_STORAGE_DIR: "/data/videos"
      VIDEO_SERVER_METADATA_FILE: "/data/video_index.json"
      VIDEO_SERVER_MAX_UPLOAD_MB: "1024"
      VIDEO_SERVER_DEFAULT_TTL_DAYS: "30"
    volumes:
      - ./data:/data
